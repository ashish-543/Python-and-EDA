---
version: 1
disable_existing_loggers: true

formatters:
  extra_formatter:
    style: "%"
    format: '%(asctime)s | %(name)s | %(levelname)s | %(message)s | %(funcName)s | {"arg1": %(arg1)d, "arg2": "%(arg2)s"}'

handlers:
  console:
    formatter: extra_formatter
    class: logging.StreamHandler
    stream: ext://sys.stdout

root:
  level: DEBUG
  handlers: [console]

loggers:
  app:
    level: INFO
    handlers: []
    propagate: true
