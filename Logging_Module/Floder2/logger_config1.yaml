---
version: 1
disable_existing_loggers: true

formatters:
  simple:
    style: "%"
    format: "SIMPLE FORMATTER: %(asctime)s | %(name)s | %(levelname)s | %(message)s"

handlers:
  console:
    formatter: simple
    class: logging.StreamHandler
    stream: ext://sys.stdout

root:
  level: WARNING
  handlers: [console]

loggers:
  app:
    level: DEBUG
    handlers: []
    propagate: false
